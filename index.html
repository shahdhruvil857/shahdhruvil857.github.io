<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portfolio</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#07080f; --surface:#0d0f1c; --border:rgba(255,255,255,0.07);
  --text:#e8eaf0; --muted:rgba(232,234,240,0.42); --accent:#5b8fff;
  --accent2:#a78bfa; --gap:1px;
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{background:var(--bg);font-family:'DM Mono',monospace;color:var(--text);overflow-x:hidden;}

/* ── Canvas ── */
#bg{position:fixed;inset:0;z-index:0;pointer-events:none;}

/* ── Layout ── */
.layout{display:grid;grid-template-columns:210px 1fr;min-height:100vh;position:relative;z-index:10;}

/* ── Sidebar ── */
.sidebar{
  position:sticky;top:0;height:100vh;
  border-right:1px solid var(--border);
  padding:44px 28px;
  display:flex;flex-direction:column;
  background:rgba(7,8,15,0.72);
  backdrop-filter:blur(16px);
}
.logo{font-family:'DM Serif Display',serif;font-size:1.08rem;color:var(--text);margin-bottom:3px;}
.logo-role{font-size:.6rem;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);margin-bottom:48px;}
nav{display:flex;flex-direction:column;gap:1px;}
.nav-link{
  font-size:.67rem;letter-spacing:.09em;text-transform:uppercase;
  color:var(--muted);padding:10px 12px;border-radius:6px;
  cursor:pointer;display:flex;align-items:center;gap:9px;
  transition:color .18s,background .18s;text-decoration:none;
}
.nav-link .dot{width:4px;height:4px;border-radius:50%;background:var(--accent);opacity:0;transition:opacity .18s;flex-shrink:0;}
.nav-link:hover,.nav-link.active{color:var(--text);background:rgba(91,143,255,.07);}
.nav-link:hover .dot,.nav-link.active .dot{opacity:1;}
.sidebar-foot{margin-top:auto;padding-top:28px;border-top:1px solid var(--border);display:flex;align-items:center;gap:8px;font-size:.6rem;letter-spacing:.09em;text-transform:uppercase;color:var(--muted);}
.avail-dot{width:6px;height:6px;border-radius:50%;background:#4ade80;box-shadow:0 0 7px #4ade80;animation:blink 2s ease-in-out infinite;flex-shrink:0;}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.35}}

/* Hamburger */
.hamburger{display:none;position:fixed;top:16px;left:16px;z-index:200;
  width:40px;height:40px;border-radius:8px;background:rgba(7,8,15,.9);
  border:1px solid var(--border);flex-direction:column;align-items:center;
  justify-content:center;gap:5px;cursor:pointer;backdrop-filter:blur(12px);}
.hamburger span{width:18px;height:1.5px;background:var(--text);border-radius:2px;transition:all .25s;}
.hamburger.open span:nth-child(1){transform:translateY(6.5px) rotate(45deg);}
.hamburger.open span:nth-child(2){opacity:0;}
.hamburger.open span:nth-child(3){transform:translateY(-6.5px) rotate(-45deg);}

/* ── Main scroll area ── */
.main{display:flex;flex-direction:column;}

/* ── Section base ── */
section{
  min-height:100vh;padding:80px 68px;
  display:flex;flex-direction:column;justify-content:center;
  border-bottom:1px solid var(--border);
  position:relative;
}
.s-label{font-size:.58rem;letter-spacing:.18em;text-transform:uppercase;color:var(--accent);margin-bottom:8px;opacity:.7;}
.s-title{font-family:'DM Serif Display',serif;font-size:clamp(1.8rem,2.8vw,2.5rem);font-weight:400;color:var(--text);margin-bottom:32px;line-height:1.1;}

/* ══════════════════════════════
   HERO — two-column with photo
══════════════════════════════ */
#hero{min-height:100vh;justify-content:center;}
.hero-inner{
  display:grid;
  grid-template-columns:1fr 320px;
  gap:60px;
  align-items:center;
  width:100%;
  max-width:960px;
}
.hero-text{display:flex;flex-direction:column;}
.hero-eyebrow{font-size:.6rem;letter-spacing:.18em;text-transform:uppercase;color:var(--accent);margin-bottom:18px;opacity:.75;}
.hero-name{font-family:'DM Serif Display',serif;font-size:clamp(2.6rem,4.5vw,4.2rem);line-height:1.04;color:var(--text);font-weight:400;margin-bottom:10px;}
.hero-name em{font-style:italic;background:linear-gradient(120deg,var(--accent),var(--accent2));-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;}
.hero-role-line{font-size:.78rem;letter-spacing:.06em;color:var(--muted);margin-bottom:22px;}
.hero-desc{font-size:.85rem;line-height:1.85;color:var(--muted);max-width:440px;margin-bottom:36px;}
.hero-btns{display:flex;gap:12px;flex-wrap:wrap;}
.btn-p{padding:10px 26px;border-radius:7px;background:var(--accent);color:#fff;font-family:'DM Mono',monospace;font-size:.66rem;letter-spacing:.1em;text-transform:uppercase;cursor:pointer;border:none;transition:all .2s;}
.btn-p:hover{background:#7aaaff;transform:translateY(-1px);box-shadow:0 8px 22px rgba(91,143,255,.32);}
.btn-g{padding:10px 26px;border-radius:7px;background:transparent;color:var(--muted);font-family:'DM Mono',monospace;font-size:.66rem;letter-spacing:.1em;text-transform:uppercase;cursor:pointer;border:1px solid var(--border);transition:all .2s;}
.btn-g:hover{color:var(--text);border-color:rgba(255,255,255,.16);}

/* Profile card — right side */
.profile-card{
  display:flex;flex-direction:column;align-items:center;gap:18px;
  padding:32px 24px 28px;
  border:1px solid var(--border);border-radius:20px;
  background:rgba(255,255,255,.02);backdrop-filter:blur(10px);
  text-align:center;
  position:relative;
  overflow:hidden;
}
.profile-card::before{
  content:'';position:absolute;inset:0;
  background:radial-gradient(circle at 50% 0%,rgba(91,143,255,.08) 0%,transparent 70%);
  pointer-events:none;
}
.profile-photo-wrap{
  position:relative;
  width:130px;height:130px;
}
.profile-photo-ring{
  position:absolute;inset:-3px;
  border-radius:50%;
  background:conic-gradient(var(--accent),var(--accent2),var(--accent));
  animation:spin 6s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg)}}
.profile-photo-inner{
  position:absolute;inset:3px;border-radius:50%;
  background:var(--bg);
  overflow:hidden;
  display:flex;align-items:center;justify-content:center;
}
.profile-photo{
  width:100%;height:100%;
  object-fit:cover;
  /* mix-blend-mode removes background on photos with transparent bg */
}
.profile-photo-emoji{font-size:3.2rem;line-height:1;}
.p-name{font-family:'DM Serif Display',serif;font-size:1.15rem;color:var(--text);}
.p-loc{font-size:.62rem;letter-spacing:.07em;color:var(--muted);margin-top:2px;}
.p-divider{width:40px;height:1px;background:var(--border);margin:4px auto;}
.p-tags{display:flex;flex-wrap:wrap;gap:5px;justify-content:center;margin-top:4px;}
.p-tag{font-size:.58rem;letter-spacing:.07em;text-transform:uppercase;color:var(--muted);padding:3px 9px;border:1px solid var(--border);border-radius:3px;}

/* ── ABOUT ── */
#about{}
.about-body{font-size:.85rem;line-height:1.9;color:var(--muted);max-width:500px;margin-bottom:32px;}
.about-body strong{color:var(--text);font-weight:400;}
.stats{display:flex;gap:36px;flex-wrap:wrap;}
.stat-n{font-family:'DM Serif Display',serif;font-size:1.8rem;color:var(--text);line-height:1;}
.stat-l{font-size:.6rem;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-top:4px;}

/* ══════════════════════════════
   SKILLS — centered slider
══════════════════════════════ */
#skills{align-items:center;text-align:center;}
#skills .s-label{text-align:center;}
#skills .s-title{text-align:center;}
.skills-slider-wrap{
  width:100%;max-width:820px;
  position:relative;
  margin:0 auto;
}
.slider-mask{overflow:hidden;border-radius:12px;}
.slider-track{display:flex;gap:18px;transition:transform .45s cubic-bezier(.22,1,.36,1);}
.skill-slide{
  flex:0 0 120px;min-width:120px;
  padding:22px 14px;border:1px solid var(--border);border-radius:12px;
  background:rgba(255,255,255,.02);
  display:flex;flex-direction:column;align-items:center;gap:12px;
  transition:border-color .2s,background .2s;cursor:default;
}
.skill-slide:hover{border-color:rgba(91,143,255,.35);background:rgba(91,143,255,.05);}
.skill-logo{width:40px;height:40px;object-fit:contain;filter:brightness(.85);transition:filter .2s;}
.skill-slide:hover .skill-logo{filter:brightness(1.1) saturate(1.2);}
.skill-logo-fallback{width:40px;height:40px;display:flex;align-items:center;justify-content:center;font-size:1.5rem;display:none;}
.skill-slide-name{font-size:.6rem;letter-spacing:.07em;text-transform:uppercase;color:var(--muted);text-align:center;}

/* Slider controls */
.slider-controls{display:flex;align-items:center;justify-content:center;gap:16px;margin-top:24px;}
.slider-btn{
  width:38px;height:38px;border-radius:50%;
  background:rgba(7,8,15,.85);border:1px solid var(--border);
  color:var(--muted);font-size:1rem;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:all .2s;flex-shrink:0;
}
.slider-btn:hover{color:var(--text);border-color:rgba(255,255,255,.18);background:rgba(91,143,255,.1);}
.slider-dots{display:flex;gap:6px;align-items:center;}
.slider-dot{width:5px;height:5px;border-radius:50%;background:var(--muted);opacity:.4;transition:all .25s;cursor:pointer;}
.slider-dot.active{opacity:1;background:var(--accent);width:18px;border-radius:3px;}

/* ══════════════════════════════
   PROJECTS — 3/2/1 col grid
══════════════════════════════ */
#projects{}
.proj-grid{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:22px;
}
.proj-card{
  border:1px solid var(--border);border-radius:14px;overflow:hidden;
  background:rgba(255,255,255,.02);
  transition:border-color .25s,transform .25s,box-shadow .25s;
  display:flex;flex-direction:column;
}
.proj-card:hover{border-color:rgba(91,143,255,.3);transform:translateY(-4px);box-shadow:0 16px 40px rgba(0,0,0,.35);}
.proj-img-placeholder{
  width:100%;height:160px;
  background:linear-gradient(135deg,rgba(91,143,255,.12),rgba(167,139,250,.08));
  display:flex;align-items:center;justify-content:center;font-size:2.5rem;
  border-bottom:1px solid var(--border);
}
.proj-img{width:100%;height:160px;object-fit:cover;display:block;background:var(--surface);border-bottom:1px solid var(--border);}
.proj-body{padding:18px 20px 20px;flex:1;display:flex;flex-direction:column;gap:10px;}
.proj-title{font-family:'DM Serif Display',serif;font-size:1rem;color:var(--text);font-weight:400;}
.proj-desc{font-size:.74rem;line-height:1.72;color:var(--muted);flex:1;}

/* Tech logos in cards */
.proj-tech{display:flex;flex-wrap:wrap;gap:8px;margin-top:4px;align-items:center;}
.proj-tech-logo{
  width:26px;height:26px;object-fit:contain;
  filter:brightness(.7) grayscale(.2);
  transition:filter .2s;border-radius:4px;
}
.proj-tech-logo:hover{filter:brightness(1) grayscale(0);}
.proj-tech-fallback{
  font-size:.56rem;letter-spacing:.06em;text-transform:uppercase;
  color:var(--muted);padding:3px 7px;border:1px solid var(--border);
  border-radius:3px;display:none;
}

.proj-actions{display:flex;gap:8px;margin-top:12px;}
.btn-sm{padding:7px 18px;border-radius:6px;font-family:'DM Mono',monospace;font-size:.62rem;letter-spacing:.09em;text-transform:uppercase;cursor:pointer;transition:all .18s;text-decoration:none;display:inline-flex;align-items:center;}
.btn-sm-p{background:var(--accent);color:#fff;border:none;}
.btn-sm-p:hover{background:#7aaaff;}
.btn-sm-g{background:transparent;color:var(--muted);border:1px solid var(--border);}
.btn-sm-g:hover{color:var(--text);border-color:rgba(255,255,255,.16);}

/* ── POPUP ── */
.popup-overlay{
  position:fixed;inset:0;z-index:1000;
  background:rgba(7,8,15,.9);backdrop-filter:blur(18px);
  display:flex;align-items:center;justify-content:center;padding:40px 20px;
  opacity:0;visibility:hidden;transition:opacity .3s,visibility .3s;
}
.popup-overlay.open{opacity:1;visibility:visible;}
.popup-box{
  background:var(--surface);border:1px solid var(--border);border-radius:18px;
  max-width:640px;width:100%;max-height:80vh;overflow-y:auto;
  scrollbar-width:thin;scrollbar-color:var(--accent) transparent;
  padding:36px 40px;position:relative;
  animation:popIn .3s ease;
}
@keyframes popIn{from{transform:scale(.96);opacity:0}to{transform:scale(1);opacity:1}}
.popup-close{position:absolute;top:16px;right:18px;background:none;border:none;color:var(--muted);font-size:1.2rem;cursor:pointer;line-height:1;transition:color .18s;}
.popup-close:hover{color:var(--text);}
.popup-img{width:100%;height:220px;object-fit:cover;border-radius:10px;margin-bottom:24px;}
.popup-img-ph{width:100%;height:220px;border-radius:10px;margin-bottom:24px;background:linear-gradient(135deg,rgba(91,143,255,.15),rgba(167,139,250,.1));display:flex;align-items:center;justify-content:center;font-size:3rem;}
.popup-title{font-family:'DM Serif Display',serif;font-size:1.6rem;font-weight:400;color:var(--text);margin-bottom:8px;}
.popup-sub{font-size:.66rem;letter-spacing:.1em;text-transform:uppercase;color:var(--accent);margin-bottom:18px;opacity:.8;}
.popup-body{font-size:.82rem;line-height:1.85;color:var(--muted);margin-bottom:22px;}
.popup-tech{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:24px;align-items:center;}
.popup-tech-logo{width:32px;height:32px;object-fit:contain;filter:brightness(.85);}
.popup-link{display:inline-flex;align-items:center;gap:8px;padding:10px 24px;border-radius:7px;background:var(--accent);color:#fff;font-family:'DM Mono',monospace;font-size:.66rem;letter-spacing:.1em;text-transform:uppercase;text-decoration:none;transition:all .2s;}
.popup-link:hover{background:#7aaaff;}

/* ══════════════════════════════
   CONTACT — centered
══════════════════════════════ */
#contact{align-items:center;text-align:center;}
#contact .s-label{text-align:center;}
#contact .s-title{text-align:center;}
#contact .about-body{text-align:center;margin:0 auto 36px;}
.contact-cards{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:18px;
  max-width:640px;
  width:100%;
  margin:0 auto;
}
.contact-card{
  padding:26px 22px;border:1px solid var(--border);border-radius:12px;
  background:rgba(255,255,255,.02);cursor:pointer;
  transition:border-color .2s,background .2s,transform .2s;
  text-decoration:none;display:block;text-align:center;
}
.contact-card:hover{border-color:rgba(91,143,255,.3);background:rgba(91,143,255,.05);transform:translateY(-3px);}
.cc-icon{font-size:1.5rem;margin-bottom:14px;display:block;}
.cc-label{font-size:.58rem;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);margin-bottom:6px;}
.cc-val{font-size:.74rem;color:var(--text);word-break:break-all;}

/* ══════════════════════════════
   RESPONSIVE — Tablet ≤ 960px
══════════════════════════════ */
@media(max-width:960px){
  .layout{grid-template-columns:1fr;}
  .sidebar{
    position:fixed;top:0;left:-240px;width:220px;height:100vh;
    z-index:150;transition:left .3s cubic-bezier(.22,1,.36,1);
    background:rgba(7,8,15,.97);
  }
  .sidebar.mobile-open{left:0;}
  .hamburger{display:flex;}
  .main{padding-top:0;}
  section{padding:80px 40px;}
  .hero-inner{
    grid-template-columns:1fr;
    gap:40px;
    text-align:center;
  }
  .hero-text{align-items:center;}
  .hero-desc{text-align:center;max-width:100%;}
  .hero-btns{justify-content:center;}
  .profile-card{max-width:280px;margin:0 auto;}
  .proj-grid{grid-template-columns:repeat(2,1fr);}
  .contact-cards{grid-template-columns:repeat(2,1fr);max-width:440px;}
}

/* ══════════════════════════════
   RESPONSIVE — Mobile ≤ 600px
══════════════════════════════ */
@media(max-width:600px){
  section{padding:72px 24px;}
  .hero-name{font-size:clamp(2rem,8vw,2.8rem);}
  .s-title{font-size:clamp(1.4rem,5vw,1.9rem);}
  .proj-grid{grid-template-columns:1fr;}
  .contact-cards{grid-template-columns:1fr;max-width:340px;}
  .stats{gap:24px;}
  .skills-slider-wrap{max-width:100%;}
  .skill-slide{flex:0 0 100px;min-width:100px;}
  .popup-box{padding:28px 22px;}
}
</style>
</head>
<body>

<canvas id="bg"></canvas>

<!-- Hamburger toggle -->
<button class="hamburger" id="hamburger" aria-label="Toggle menu">
  <span></span><span></span><span></span>
</button>

<div class="layout">

  <!-- Sidebar -->
  <aside class="sidebar" id="sidebar">
    <div id="sb-logo" class="logo"></div>
    <div id="sb-role" class="logo-role"></div>
    <nav id="main-nav">
      <a class="nav-link" href="#hero"    ><span class="dot"></span>Home</a>
      <a class="nav-link" href="#about"   ><span class="dot"></span>About</a>
      <a class="nav-link" href="#skills"  ><span class="dot"></span>Skills</a>
      <a class="nav-link" href="#projects"><span class="dot"></span>Projects</a>
      <a class="nav-link" href="#contact" ><span class="dot"></span>Contact</a>
    </nav>
    <div class="sidebar-foot">
      <span class="avail-dot"></span><span id="sb-avail"></span>
    </div>
  </aside>

  <!-- Main -->
  <main class="main">

    <!-- HERO -->
    <section id="hero">
      <div class="hero-inner">
        <!-- Left: text -->
        <div class="hero-text">
          <div class="hero-eyebrow" id="h-eyebrow"></div>
          <h1 class="hero-name" id="h-name"></h1>
          <div class="hero-role-line" id="h-role"></div>
          <p class="hero-desc" id="h-desc"></p>
          <div class="hero-btns">
            <button class="btn-p" onclick="document.getElementById('projects').scrollIntoView({behavior:'smooth'})">View Projects</button>
            <button class="btn-g" onclick="document.getElementById('contact').scrollIntoView({behavior:'smooth'})">Get in Touch</button>
          </div>
        </div>
        <!-- Right: profile card -->
        <div class="profile-card" id="profile-card"></div>
      </div>
    </section>

    <!-- ABOUT -->
    <section id="about">
      <div class="s-label">About</div>
      <h2 class="s-title" id="ab-title"></h2>
      <p class="about-body" id="ab-body"></p>
      <div class="stats" id="ab-stats"></div>
    </section>

    <!-- SKILLS -->
    <section id="skills">
      <div class="s-label">Skills</div>
      <h2 class="s-title">Technologies I work<br>with every day.</h2>
      <div class="skills-slider-wrap">
        <div class="slider-mask">
          <div class="slider-track" id="sl-track"></div>
        </div>
        <div class="slider-controls">
          <button class="slider-btn" id="sl-prev">‹</button>
          <div class="slider-dots" id="sl-dots"></div>
          <button class="slider-btn" id="sl-next">›</button>
        </div>
      </div>
    </section>

    <!-- PROJECTS -->
    <section id="projects">
      <div class="s-label">Projects</div>
      <h2 class="s-title">Selected work.</h2>
      <div class="proj-grid" id="proj-grid"></div>
    </section>

    <!-- CONTACT -->
    <section id="contact">
      <div class="s-label">Contact</div>
      <h2 class="s-title" id="ct-title"></h2>
      <p class="about-body" id="ct-body"></p>
      <div class="contact-cards" id="ct-cards"></div>
    </section>

  </main>
</div>

<!-- Project Popup -->
<div class="popup-overlay" id="popup">
  <div class="popup-box" id="popup-box">
    <button class="popup-close" id="popup-close">✕</button>
    <div id="popup-content"></div>
  </div>
</div>

<script>
/* ═══════════════════════════════
   DATA — edit everything here
═══════════════════════════════ */

    emoji: "👨‍💻",        // shown if no photo
    location: "Ahmedabad, Gujarat, India.",
    tags: ["Open to Remote", "Freelance", "Full-time"]
  },

  about: {

    body: "I build fast, scalable, and user-focused websites that don’t just look good but perform exceptionally. <br/>From clean UI to optimized backend systems, I focus on delivering seamless digital experiences that drive real results.",

skills: [

/* ═══════════════════════════════

═══════════════════════════════ */
function techLogoHTML(tech, size=26) {
  const src = DATA.techLogos[tech];
  if (src) {
    return `<img class="proj-tech-logo" src="${src}" alt="${tech}" title="${tech}" width="${size}" height="${size}"
      onerror="this.style.display='none';this.nextElementSibling.style.display='inline-block'">
      <span class="proj-tech-fallback">${tech}</span>`;
  }
  return `<span class="proj-tech-fallback" style="display:inline-block">${tech}</span>`;
}

  document.getElementById('sb-avail').textContent = DATA.availability;

  // Hero
  document.getElementById('h-eyebrow').textContent = DATA.eyebrow;

  document.getElementById('h-desc').textContent = DATA.heroDesc;

  const pc = document.getElementById('profile-card');

  document.getElementById('popup').classList.add('open');
  document.body.style.overflow = 'hidden';
}
document.getElementById('popup-close').addEventListener('click', closePopup);
document.getElementById('popup').addEventListener('click', e => { if(e.target===e.currentTarget) closePopup(); });
document.addEventListener('keydown', e => { if(e.key==='Escape') closePopup(); });
function closePopup() {
  document.getElementById('popup').classList.remove('open');
  document.body.style.overflow = '';
}

/* ═══════════════════════════════
   SKILLS SLIDER — centered & dots
═══════════════════════════════ */
let slIndex = 0;
const SLIDE_W = 138; // 120 + 18 gap

function visibleSlides() {
  const wrap = document.querySelector('.slider-mask');
  if (!wrap) return 4;
  return Math.floor(wrap.offsetWidth / SLIDE_W);
}

function totalPages() {
  const vis = visibleSlides();
  return Math.max(1, Math.ceil(DATA.skills.length / vis));
}

function buildDots() {
  const dotsEl = document.getElementById('sl-dots');
  const pages = totalPages();
  dotsEl.innerHTML = Array.from({length:pages},(_,i)=>
    `<div class="slider-dot${i===0?' active':''}" data-page="${i}"></div>`).join('');
  dotsEl.querySelectorAll('.slider-dot').forEach(d => {
    d.addEventListener('click', () => { slIndex = +d.dataset.page * visibleSlides(); updateSlider(); });
  });
}

function updateSlider() {
  const max = Math.max(0, DATA.skills.length - visibleSlides());
  slIndex = Math.max(0, Math.min(slIndex, max));
  document.getElementById('sl-track').style.transform = `translateX(-${slIndex * SLIDE_W}px)`;
  // update dots
  const page = Math.round(slIndex / visibleSlides());
  document.querySelectorAll('.slider-dot').forEach((d,i) => d.classList.toggle('active', i===page));
}

document.getElementById('sl-prev').addEventListener('click', () => {
  slIndex = Math.max(0, slIndex - visibleSlides()); updateSlider();
});
document.getElementById('sl-next').addEventListener('click', () => {
  slIndex = Math.min(DATA.skills.length - visibleSlides(), slIndex + visibleSlides());
  updateSlider();
});

/* ═══════════════════════════════
   ACTIVE NAV on scroll
═══════════════════════════════ */
const sections  = ['hero','about','skills','projects','contact'];
const navLinks  = document.querySelectorAll('.nav-link');
const observer  = new IntersectionObserver(entries => {
  entries.forEach(e => {
    if (e.isIntersecting) {
      navLinks.forEach(l => l.classList.remove('active'));
      const l = document.querySelector(`.nav-link[href="#${e.target.id}"]`);
      if (l) l.classList.add('active');
    }
  });
}, { threshold: 0.4 });
sections.forEach(id => { const el = document.getElementById(id); if(el) observer.observe(el); });

const ham = document.getElementById('hamburger');
const sb  = document.getElementById('sidebar');
ham.addEventListener('click', () => {
  ham.classList.toggle('open');
  sb.classList.toggle('mobile-open');
});
document.addEventListener('click', e => {
  if (!sb.contains(e.target) && !ham.contains(e.target)) {
    ham.classList.remove('open');
    sb.classList.remove('mobile-open');
  }
});
navLinks.forEach(l => l.addEventListener('click', () => {
  ham.classList.remove('open');
  sb.classList.remove('mobile-open');
}));

/* ═══════════════════════════════
   THREE.JS BACKGROUND
═══════════════════════════════ */
const canvas   = document.getElementById('bg');
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
renderer.setClearColor(0x07080f, 1);
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));

const scene  = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(60, 1, 0.1, 1000);
camera.position.z = 60;

function resize() {
  renderer.setSize(window.innerWidth, window.innerHeight);
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
}
resize();
window.addEventListener('resize', () => { resize(); buildDots(); updateSlider(); });

// White stars
const geo1 = new THREE.BufferGeometry();
const n1 = 2800, p1 = new Float32Array(n1*3);
for(let i=0;i<n1;i++){p1[i*3]=(Math.random()-.5)*700;p1[i*3+1]=(Math.random()-.5)*700;p1[i*3+2]=(Math.random()-.5)*400-60;}
geo1.setAttribute('position',new THREE.BufferAttribute(p1,3));
const mat1 = new THREE.PointsMaterial({color:0xffffff,size:.3,transparent:true,opacity:.48});
scene.add(new THREE.Points(geo1,mat1));

// Accent stars
const geo2 = new THREE.BufferGeometry();
const p2 = new Float32Array(350*3);
for(let i=0;i<350;i++){p2[i*3]=(Math.random()-.5)*600;p2[i*3+1]=(Math.random()-.5)*600;p2[i*3+2]=(Math.random()-.5)*300-40;}
geo2.setAttribute('position',new THREE.BufferAttribute(p2,3));
scene.add(new THREE.Points(geo2,new THREE.PointsMaterial({color:0x5b8fff,size:.48,transparent:true,opacity:.32})));

// Faint nebula ring
const neb = new THREE.Mesh(
  new THREE.TorusGeometry(90,28,3,70),
  new THREE.MeshBasicMaterial({color:0x0d1a44,wireframe:true,transparent:true,opacity:.045})
);
neb.rotation.x=1.1; neb.position.z=-140;
scene.add(neb);

let mx=0,my=0;
document.addEventListener('mousemove',e=>{mx=(e.clientX/window.innerWidth-.5)*2;my=(e.clientY/window.innerHeight-.5)*2;});
let t=0;
(function loop(){
  requestAnimationFrame(loop); t+=.003;
  camera.position.x+=(mx*4-camera.position.x)*.025;
  camera.position.y+=(-my*3-camera.position.y)*.025;
  camera.lookAt(0,0,0);
  neb.rotation.z+=.0004;
  mat1.opacity=.44+Math.sin(t)*.055;
  renderer.render(scene,camera);
})();

/* ── INIT ── */
render();
navLinks[0].classList.add('active');
</script>
